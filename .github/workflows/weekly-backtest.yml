name: Weekly Backtest

on:
  # Run every Sunday at 10:00 UTC
  schedule:
    - cron: "0 10 * * 0"

  workflow_dispatch:
    inputs:
      run_date:
        description: "Backtest as-of date (YYYY-MM-DD)"
        required: false
        type: string

env:
  PYTHON_VERSION: "3.12"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            echo "RUN_DATE=${{ inputs.run_date }}" >> "$GITHUB_ENV"
          else
            echo "RUN_DATE=$(date +%F)" >> "$GITHUB_ENV"
          fi

      - name: Bootstrap
        run: python scripts/bootstrap.py --sample-row

      - name: Run backtest
        run: make backtest RUN_DATE=${{ env.RUN_DATE }} || true

      - name: Upload backtest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ env.RUN_DATE }}
          path: runs/${{ env.RUN_DATE }}/backtest*
          retention-days: 90
